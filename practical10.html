<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Embedded Website</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
}

.logo {
    font-size: 22px;
    font-weight: 600;
}

nav ul {
    display: flex;
    gap: 20px;
    list-style: none;
}

nav ul li {
    cursor: pointer;
    transition: 0.3s;
}

nav ul li:hover {
    color: #00ffd5;
}

/* LAYOUT */
.container {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: rgba(0,0,0,0.5);
    padding: 20px;
    min-height: 100vh;
}

.sidebar h3 {
    margin-bottom: 15px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 10px 0;
    padding: 8px;
    border-radius: 8px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #00ffd5;
    color: black;
    transform: translateX(5px);
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 350px;
    border: none;
    border-radius: 12px;
    margin-bottom: 20px;
    transition: 0.4s;
}

iframe:hover {
    transform: scale(1.02);
}

/* CARD SECTION */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 250px;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.4s;
}

.card i {
    font-size: 30px;
    margin-bottom: 10px;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

/* BUTTON */
.btn {
    padding: 10px 15px;
    border: none;
    background: #00ffd5;
    color: black;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
}

.btn:hover {
    transform: scale(1.1);
}

/* DARK MODE */
.dark {
    background: #111;
    color: #eee;
}

/* RESPONSIVE */
@media(max-width: 800px) {
    .container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        display: flex;
        justify-content: space-around;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">ProSite</div>
    <ul>
        <li>Home</li>
        <li>Services</li>
        <li>Contact</li>
    </ul>
</nav>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Menu</h3>

    <a href="#" onclick="loadPage('https://www.wikipedia.org')">
        <i class="fa fa-globe"></i> Wikipedia
    </a>

    <a href="#" onclick="loadPage('https://www.openstreetmap.org/export/embed.html')">
        <i class="fa fa-map"></i> Map
    </a>

    <a href="#" onclick="loadPage('https://www.youtube.com/embed/tgbNymZ7vqY')">
        <i class="fa fa-video"></i> YouTube
    </a>

</div>

<!-- CONTENT -->
<div class="content">

    <h1>Embedded Content</h1>
    <p>This webpage demonstrates iframe embedding of maps and external websites.</p>

    <!-- Dynamic Iframe -->
    <iframe id="frame" src="https://www.wikipedia.org"></iframe>

    <!-- STATIC EMBEDS -->
    <h2>Google Map</h2>
    <iframe src="https://www.google.com/maps?q=Nagpur&output=embed"></iframe>

    <h2>YouTube Video</h2>
    <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <i class="fa fa-code"></i>
            <h3>HTML</h3>
            <p>Structure of web pages</p>
        </div>

        <div class="card">
            <i class="fa fa-paint-brush"></i>
            <h3>CSS</h3>
            <p>Styling and animations</p>
        </div>

        <div class="card">
            <i class="fa fa-bolt"></i>
            <h3>JavaScript</h3>
            <p>Dynamic interactions</p>
        </div>
    </div>

    <button class="btn" onclick="toggleDark()">Toggle Dark Mode</button>

</div>

</div>

<script>
function loadPage(url) {
    document.getElementById("frame").src = url;
}

function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
